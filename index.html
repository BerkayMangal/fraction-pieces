<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fraction Pieces</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div id="startScreen" class="screen active">
<h1>Fraction Pieces 🍕</h1>
<button id="playBtn">Play</button>
<button id="howBtn">How to Play</button>
</div>

<div id="howScreen" class="screen">
<h2>How to Play</h2>
<p>Tap a topping.</p>
<p>Tap pizza slices.</p>
<p>Match the order pizza.</p>
<button id="backBtn">Back</button>
</div>

<div id="gameScreen" class="screen">

<h1>Fraction Pieces 🍕</h1>

<div id="order">
<h3>Customer Order</h3>
<div id="orderPreview" class="miniPizza"></div>
</div>

<div id="pizza"></div>

<div id="toppings">
<button data-top="cheese">🧀</button>
<button data-top="olive">🫒</button>
<button data-top="pepperoni">🍕</button>
</div>

<button id="serveBtn">Serve Pizza</button>

<div id="stars"></div>
<div id="message"></div>

</div>

<script src="levels.js"></script>
<script src="game.js"></script>

</body>
</html>
