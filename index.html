<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Fraction Pieces</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div id="startScreen" class="screen active">

<img src="assets/logo.png" class="logo">

<button class="playButton" onclick="startGame()">PLAY</button>

</div>

<div id="gameScreen" class="screen">

<div class="topBar">

<img src="assets/chef-mozza.png" class="chef">

<div id="speech">Make the pizza!</div>

<img src="assets/slice.png" class="sliceChar">

</div>

<div id="orderPreview" class="miniPizza"></div>

<div id="pizza"></div>

<div id="toppings">

<img src="assets/cheese.png" onclick="selectTopping('cheese')" class="topping">

<img src="assets/olive.png" onclick="selectTopping('olive')" class="topping">

<img src="assets/pepperoni.png" onclick="selectTopping('pepperoni')" class="topping">

</div>

<button id="serveButton" onclick="servePizza()">Serve Pizza</button>

<div id="stars"></div>

</div>

<script src="levels.js"></script>
<script src="game.js"></script>

</body>
</html>
